<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>OnlyUp — 오늘 뭐 만들까?</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#1e1e1e; --bg2:#181818; --card:#252526; --card2:#2d2d2d; --line:#3c3c3c;
    --ink:#d4d4d4; --dim:#8a8d94; --accent:#0e639c; --accent2:#4a9eff; --green:#89d185; --red:#f14c4c;
    --mono:'JetBrains Mono','Cascadia Mono',Consolas,monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ background:var(--bg); color:var(--ink); font-family:-apple-system,'Segoe UI',system-ui,'Malgun Gothic',sans-serif;
    padding:14px 16px calc(20px + env(safe-area-inset-bottom)); -webkit-font-smoothing:antialiased; overflow-x:hidden; }

  /* ---- opening splash ---- */
  #splash{ position:fixed; inset:0; z-index:100; background:radial-gradient(120% 90% at 50% 30%, #23252b 0%, #151518 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; animation:splashOut .5s ease 1.6s forwards; }
  #splash .mark{ font-size:56px; font-weight:800; color:var(--accent2); text-shadow:0 0 34px rgba(74,158,255,.55); animation:markIn .9s cubic-bezier(.2,.8,.2,1) both; }
  #splash .word{ font-size:22px; font-weight:700; letter-spacing:.04em; color:var(--ink); animation:wordIn .7s ease .35s both; }
  #splash .tag{ font-size:12px; color:var(--dim); animation:wordIn .7s ease .55s both; }
  #splash .bar{ width:120px; height:3px; border-radius:3px; background:#2c2f36; overflow:hidden; margin-top:6px; animation:wordIn .5s ease .5s both; }
  #splash .bar i{ display:block; height:100%; width:40%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; animation:load 1.4s ease-in-out .4s both; }
  @keyframes markIn{ 0%{ transform:scale(.4) translateY(10px); opacity:0; filter:blur(6px); } 100%{ transform:scale(1) translateY(0); opacity:1; filter:blur(0); } }
  @keyframes wordIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes load{ 0%{ transform:translateX(-120%);} 100%{ transform:translateX(320%);} }
  @keyframes splashOut{ to{ opacity:0; visibility:hidden; } }

  /* ---- app ---- */
  .top{ display:flex; align-items:center; gap:8px; margin-bottom:14px; animation:rise .5s ease 1.5s both; }
  .top .logo{ color:var(--accent2); font-weight:800; font-size:16px; }
  .top .st{ margin-left:auto; font-size:11px; color:var(--dim); }
  h1{ font-size:22px; margin:2px 0 4px; font-weight:700; animation:rise .5s ease 1.6s both; }
  .sub{ color:var(--dim); font-size:13px; margin-bottom:14px; animation:rise .5s ease 1.65s both; }
  .composer{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; animation:rise .5s ease 1.7s both; }
  textarea{ width:100%; min-height:120px; background:transparent; color:var(--ink); border:none; outline:none; font-size:16px; line-height:1.5; resize:none; font-family:inherit; }
  textarea::placeholder{ color:#6b6e76; }
  .chips{ display:flex; flex-wrap:wrap; gap:7px; margin:12px 0 4px; animation:rise .5s ease 1.75s both; }
  .chip{ font-size:12px; color:var(--dim); background:var(--card); border:1px solid var(--line); border-radius:20px; padding:7px 12px; cursor:pointer; }
  .chip:active{ background:var(--card2); color:var(--ink); }
  .row{ display:flex; gap:10px; margin-top:14px; animation:rise .5s ease 1.8s both; }
  button{ font-family:inherit; border:none; cursor:pointer; }
  #mic{ flex:0 0 auto; width:56px; height:56px; border-radius:16px; background:var(--card); border:1px solid var(--line); color:var(--accent2); font-size:24px; display:flex; align-items:center; justify-content:center; }
  #mic.rec{ background:rgba(241,76,76,.16); border-color:var(--red); color:var(--red); animation:pulse 1.1s infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(241,76,76,.4);} 50%{ box-shadow:0 0 0 10px rgba(241,76,76,0);} }
  #send{ flex:1; border-radius:16px; background:var(--accent); color:#fff; font-size:17px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:8px; }
  #send:active{ background:#1177bb; }
  #send:disabled{ opacity:.5; }
  #msg{ margin-top:12px; color:var(--dim); font-size:13px; min-height:18px; text-align:center; }
  .hint{ margin-top:18px; color:var(--dim); font-size:12px; line-height:1.6; animation:rise .5s ease 1.9s both; }
  .hint b{ color:var(--ink); }
  .sig{ text-align:center; color:#5a5d64; font-size:11px; margin-top:22px; }
  @keyframes rise{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }
</style>
</head>
<body>
  <div id="splash">
    <div class="mark">▲</div>
    <div class="word">OnlyUp</div>
    <div class="tag">말하면 PC가 만듭니다</div>
    <div class="bar"><i></i></div>
  </div>

  <div class="top"><span class="logo">▲ OnlyUp</span><span class="st" id="conn">● 연결됨</span></div>
  <h1>오늘 무엇을 만들까요?</h1>
  <div class="sub">아이디어를 말하거나 적으면, 집 PC의 OnlyUp이 계획→구현→검토까지 알아서 만듭니다.</div>

  <div class="composer">
    <textarea id="idea" placeholder="예: 공황장애 관리 앱 만들어줘 — 호흡 타이머랑 기록 화면 필요"></textarea>
  </div>

  <div class="chips" id="chips"></div>

  <div class="row">
    <button id="mic" title="음성으로 말하기">🎤</button>
    <button id="send">▶ PC에서 만들기</button>
  </div>
  <div id="msg"></div>

  <div class="hint">🎙 <b>마이크</b>를 누르고 아이디어를 말하면 글로 바뀝니다.<br>🖼 참고 이미지·PDF·URL은 이 봇 채팅에 <b>그냥 보내면</b> PC가 읽어서 반영합니다.<br>▶ <b>만들기</b>를 누르면 PC가 자동으로 만들고 결과를 여기로 보고합니다. <span style="opacity:.7">(PC의 OnlyUp이 켜져 있어야 합니다)</span></div>
  <div class="sig">▲ OnlyUp — AI가 만드는 개발</div>

<script>
  var tg = window.Telegram && window.Telegram.WebApp;
  if(tg){ try{ tg.ready(); tg.expand(); tg.setHeaderColor && tg.setHeaderColor('#1e1e1e'); tg.setBackgroundColor && tg.setBackgroundColor('#1e1e1e'); }catch(e){} }
  function $(id){ return document.getElementById(id); }
  function msg(t){ $('#msg').textContent = t || ''; }
  function haptic(){ try{ tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred('light'); }catch(e){} }

  // quick example chips
  var EX=['간단한 할일 앱','랜딩 페이지','예약 폼','대시보드 화면','로그인/회원가입'];
  EX.forEach(function(x){ var c=document.createElement('div'); c.className='chip'; c.textContent=x; c.onclick=function(){ var t=$('#idea'); t.value=(t.value?t.value+' ':'')+x+' 만들어줘'; haptic(); t.focus(); }; $('#chips').appendChild(c); });

  // voice → text (browser STT)
  var rec=null, base='';
  $('#mic').onclick=function(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ msg('이 기기에선 음성 인식이 안 돼요 — 직접 입력해주세요.'); return; }
    if(rec){ try{ rec.stop(); }catch(e){} return; }
    haptic(); rec=new SR(); rec.lang='ko-KR'; rec.interimResults=true; rec.continuous=true; base=$('#idea').value;
    $('#mic').classList.add('rec'); $('#mic').textContent='⏹'; msg('듣는 중… (마이크 다시 누르면 종료)');
    rec.onresult=function(e){ var t=''; for(var i=0;i<e.results.length;i++){ t+=e.results[i][0].transcript+' '; } $('#idea').value=(base+' '+t).trim(); };
    rec.onerror=function(e){ msg('음성 오류: '+(e.error||'')+' — 직접 입력해주세요.'); };
    rec.onend=function(){ $('#mic').classList.remove('rec'); $('#mic').textContent='🎤'; rec=null; msg(''); };
    try{ rec.start(); }catch(e){ msg('음성 시작 실패 — 직접 입력해주세요.'); }
  };

  $('#send').onclick=function(){
    var t=$('#idea').value.trim();
    if(!t){ msg('무엇을 만들지 적거나 말해주세요.'); return; }
    haptic();
    if(tg && tg.sendData){ try{ msg('PC로 보냈어요 — 곧 만들기 시작합니다.'); tg.sendData(t); }catch(e){ msg('전송 실패: '+e); } }
    else { msg('이 화면은 텔레그램 봇 메뉴에서 열어야 전송됩니다.'); }
  };

  // if opened outside Telegram, note it
  if(!tg || !tg.initData){ $('#conn').textContent='텔레그램 봇에서 열기'; $('#conn').style.color='#d7ba7d'; }
</script>
</body>
</html>
